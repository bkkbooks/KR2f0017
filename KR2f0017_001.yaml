body:
  text: 商文毅疏稿明商輅撰辭免學士疏題今日該吏部傳奉聖旨升臣本院學士臣竊思學士係近侍重職非學問老成弗克稱此臣自揣性資愚魯學術疏淺纍蒙恩寵無所補報方切懷慚今又蒙驟升重職益增兢惕伏望聖恩憐憫令臣仍舊職辦事以圗補報實為萬幸臣干冒天聰不勝戰懼之至謹具題請旨招撫流移疏題為招撫流移填實京畿事臣聞河南開封等府并南直隸鳳陽府等處地方近年為因水患田禾無收在彼積年逃民俱各轉徙往濟寧臨清等處四散趂食居住中間有係正統十四年以後山西并直隸真定保定等處軍民多被兵驚散逃移未久及原籍現有田産之家雖巳陸續回還復業其正統十四年巳前逃移在外年久軍民及陜西山西所屬艱難州縣并口外地方及原無田産之家俱不肯復業流移轉徙動以萬計近聞各處有司遇有外縣逃民到來一切驅逐不容在境潛住若果能驅令復業固是美事但恐前項艱難地方及素無産業或係在外逃匠囚犯等項寧死道路不願復業之人被所在官司驅逐急迫無所依歸必致失所不無激變及今水患巳息仍慮逃回河南鳳陽原處地方居住異日雖欲再行招撫必不肯從去留之機實係於此不可不慮臣竊照畿內順天等八府所屬計一百三十餘州縣所在除官府草場并官員莊田及軍民見種田地不計外其餘多有拋荒并空間無礙田地如蒙乞敕户部計議出給榜文遍行山東等處逃民聚集之所張挂曉諭前項逃民有志復業者即令復業其不願復業無所依歸之人許令於順天府等八府所屬州縣分投從便居住有司照名撥田設法賑恤其寬恤等項榜內有當開寫者悉照本部節次奏準事理明白開寫曉諭施行一面行移各府巡撫巡按等官督同各該有司遇有逃民到來即令報名在官酌量鄉村廣狹田地多寡四散安插如某州田地數少逃民數多則發遣於有田州分居住某縣田地數多逃民數少亦須將别縣逃民遞相分撥或某州可安插千人只留五百人某縣有田千頃止撥五百頃蓋人少易於賑恤田多以備後來其口糧種具等項或暫借官儲出給或勸令富民假貸俟有收成之日照數追還俱聽巡撫巡按等官設法整理從宜處置仍尋常往來撫綏及時勸課俟三五年後生計成立有家可戀有土可懷然後計户定差度田出賦清軍勾匠隨所設施合新附之户籍增舊收之版圖強本安邦莫善於此緣係招撫流移填實京畿事理未敢擅便謹具題知伏候聖裁邊務疏題為邊務事臣竊惟守邉一事最為今日急務近聞各邊操守官軍多係有名無實其故何也一則軍士寡弱一則衣食艱難夫軍士寡弱以戰則不能衣食艱難以守則不固邊城有此二弊名雖為守實乃棄之今之議者皆以遣使為請而謂邊方之事似不可為殊不知天下之事未有不可為者特患失於姑息安於因循則事始不可為耳臣訪得大同宣府獨石馬營等處原操守官軍在邊年久服習水土屢經戰陳自正統十四年額森侵犯或漫散赴京或因該管頭目帶領來京者一向夤緣在京居住即今獨石宣府等處多係各處新撥并河南輪班官軍在彼操守且輪班官軍既無室家可恃又無田地可耕因循度日懸望更替欲為久逺之計難矣若朝廷失於姑息安於因循聽令各軍巧立逰擊等項名色將前項官軍占留在京不行發遣則邊境城池愈見空虛設有軍情將何備禦前件如蒙準言乞敕兵部即將口外大同宣府獨石馬營等處正統十四年以前原操守官軍見在京居住者逐一查究并其家小盡數發去口外各該地方照舊住種操守不許各官仍前巧立名色占吝阻當違者治以重罪或有言前項官軍善戰合留在京操備者此不知輕重之論蓋京師百萬人馬中縱得前項官軍不見其多不過跟隨各頭目營幹家事而巳若邊城得此官軍可以壯威武可以嚴斥堠可以使其成家立業為久逺之計其為益豈不大哉惟陛下不惑羣議斷然發遣則邊境得人而藩屏自固矣臣又訪得口外田地極廣除屯田軍士地畝巳有定額外其守城守關軍士多無田地耕種推原其故蓋因先前在京功臣等官之家將口外附近各城堡膏腴田地占作莊田以次空間田地又被彼處鎮守總兵參將并都指揮等官占為巳業每嵗役使軍夫耕種收利肥巳其守城等項軍士非但無力耕田雖有餘力亦無近便田地可耕即曰守邊緊急在京官員雖不能役使口外軍夫但莊田尚存未免占奪軍民之業而彼處親臨管軍頭目尚有占種田地數多私役軍夫撮借官牛等項其弊仍未盡革若朝廷失於姑息安於因循不即將前項田地撥與各城軍民耕種則衣食無由足給而邊境愈見空虛前件如蒙準言乞敕户部選差能幹官員分投前去大同宣府懷來永寧等處會同各該都御史御史等官將在京官員應有莊田并彼處勢要之家占種田地盡數分𣲖與附近軍民為業若係原起科田地亦須酌量從輕起科仍乞敕各該鎮守總兵等官將各城堡軍士分作二班每上班六日令其照例操守下班六日盡數督令耕種俟收成之後併力備禦仍禁革管軍頭目不許多種田地如此則軍士之衣食自給而民間之轉輸可省夫且耕且守古人如漢趙充國諸葛亮晉羊祜皆巳行之明效大驗著在史册今日守邊之要莫善於此若舍屯種之外而欲邊城充實雖傾府庫之財竭生民之力奈軍士數多嵗月久逺亦難繼矣若有言前項功臣等官不可以無莊田則或於腹裏逺處地方量宜撥換口外之地決不可聽其置作莊田侵損守邊軍士有誤國家大計實為不便臣又訪得永平等關口官軍精壯人民安業而紫荆倒馬一帶關口官軍怯弱關內人民不免驚疑推究其故蓋永平等處係本土官軍而紫荆倒馬等關係在京撥去輪班官軍衣食不給全無固志敵兵若來不過為逃走之計耳此事屢有人言而本部未即施行者其意蓋謂京師本根之地宜留保定等處精鋭官軍在京操守殊不知方今急務守邊為上守關次之若徒守京城此為下策何也若邊方失守則關隘緊急關隘失守則腹裏人民望風流移人心搖動變故百端縱有京師軍馬強寇在逺亦何所施又有言在京管軍頭目利保定等處官軍供給柴草因此占留若果有此尤為不可前件如蒙準言乞勑兵部將保定真定等處在京備禦官軍發回附近各關口定立班次永逺操守如有不敷於附近衛所遞相撥補却將見在各關輪班官軍盡數取回在京備操如此非惟兩免重支口糧抑且邉關得人而京師鞏固雖有千百額森亦何足慮凡前三事於守邊守關頗為切要但恐於人情有礙伏望陛下決意行之則邊方幸甚減省官員疏題為減省官員事臣叨侍近密輒以愚見數事開具進呈伏乞聖覽如有可行乞敕該衙門施行如中間事有難行者乞賜寢罷臣干冒天聰不勝戰栗之至謹具題以聞一貴州湖廣先因苖冦猖獗蒙欽差保定伯梁珤右都御史王來并參將等官統領官軍往彼征剿即今賊勢巳息地方稍寧而總兵等官在彼久住軍馬衆多供給艱難況聞四川湖廣之民趲運糧餉不勝疲弊乞敕該部將梁珤等取回彼處止令都督方瑛陳友照依原奉事理調度二處官軍往來撫捕相機守戰其貴州方面并府州縣流官俱係額外添設之數俱乞取回庶得少蘇民困地方幸甚一臨清不過一縣地方蒙欽差平江侯陳豫往彼鎮守築立城垣開設衛分操練軍馬即今巳有次第切慮彼處巡按巡河管閘管糧收鈔收磚等項御史主事等官常不下七八員不無官多民擾乞敕該部將陳豫取回止令本衛指揮等官照例操守巡按御史經過提督實為便益臣又照得真定保定二府既有僉都御史祝暹在彼巡撫兼守備倒馬關其易州鎮守又有參贊軍務僉都御史陳泰近聞祝暹患病未痊合無陳泰不妨參贊照鄒來學事例就令巡撫真定保定及提督紫荆倒馬關將祝暹取回定奪庶得責任歸一一正統年間各布政司地方俱添設僉事一員専管屯田而南北直隸亦各設僉事於河南按察司帶俸令其提督順天并鳳陽等府屯種緣河南按察司與直隸有司無相統屬行事之際不無掣肘誤事今後南北直隸屯田合無照提調學校事例另設御史管理止令一處清軍御史帶管將見在僉事革去庶使便於行事一山東等布政司并直隸保定等府正統十四年起取民壯不曽赴京見在本處地方操守者彼時敕旨丁寧諭以平事之日即放寧家今經三年未見定奪况前項民壯俱係丁多殷實頭等户人大縣或五六百名小縣或不下二三百名除此之外有司每嵗科派不無靡損下户貧難小民愈致失所乞敕該部行移各處將見操民壯悉發寧家一體當差其在京操守民壯并舍人餘丁人等亦乞敕該部計議酌量放免庶幾恩信兩全日後易於驅使一薦舉本以求異材若國家科目未開則薦賢之路不可不廣方今科目大開豪傑之士皆由此進則薦舉之道豈容太濫臣竊見各處保來儒士例皆除授教職中間多有學問膚淺禮貌粗疏不由學校罔知大體此等之人一槩使之為人師範豈不有誤後學乞敕該部將見保來儒士發回原籍許令本處鄉試照例出身今後教官俱於副榜舉人三十嵗以上者選除庶幾學校得人而人材有所造就若山林中果有隱居行義不求聞達年四十以上學識卓異之人須方面府州縣官公同舉保風憲官覆實送部嚴加考驗然後録用如有不實罪坐舉保缺官疏題為缺官事臣照得本院額設孔目一員専掌管文案先因孔目馬升考滿一時文案缺人理辦該學士陳循等奏保本官升授檢討職事仍管孔目事巳經一年之上切緣檢討係史官孔目係首領官以纂修之職事兼理案牘於事體未便如蒙準題合無馬升止令任檢討職事其孔目一員乞敕吏部别選廉能勤慎相應之人銓注補缺管事庶得職務不紊緣係缺官事理未敢擅便謹題請旨用賢疏題為用賢事臣竊照見任春坊司直郎林聰原籍福建人由正統四年進士歷任刑科都給事中升今職本官學識優長操持端潔存心公正遇事敢言先在刑科衆皆推服今任司直郎固是美職但即日政務頗簡未免以有用之才置於間散之地况今吏科都給事中張久病不出如蒙乞降特旨著林聰兼吏科都給事中管事如此則恩出於朝廷非惟本官益竭忠誠勉圖報稱凡有言責者亦皆聞風感激各思自效矣且今春坊官員多係翰林等衙門兼職林聰原係都給事中今令以司直郎兼之俸祿無增品秩仍舊於事體無損於政務有益且使中外人聞之皆謂陛下誠於求言善於用賢所謂用一人而千萬人悅豈不美哉臣職居近密偶有所見不敢緘默留用賢才疏題為留用賢才事臣惟自古人臣事君以薦賢為第一事故孔子曰臧文仲其竊位者與知栁下惠之賢而不與立也先儒釋之曰臧文仲為政於魯若不知賢是不明也知而不舉是蔽賢也不明之罪小蔽賢之罪大故孔子以為竊位臣非不知此義但近年以來人心不古薦賢之際多徇私情是以亷介之人皆推避嫌疑雖有實才亦罔敢薦蓋以此也臣粗讀聖賢之書有志古人之道若狃於流俗而忘蔽賢之戒豈直道事君者哉是以不避踰越試舉在位之賢衆人所共知者為陛下言之惟聖明裁察臣竊照見今三年考滿南京禮部右侍郎姚夔原籍浙江嚴州府桐廬縣人由進士歷任吏科給事中升前職本官學識純正識見超卓存心清白立志逺大鄉試會試俱中第一名素有聲望兼之體貌豐偉表裏相稱誠有才有德之士也南京禮部比之他部政務最簡如吏部止是尚書一員禮部既有尚書張惠在任管事則本官在彼實為間散即日在京各部侍郎雖無缺員然求與朝廷幹事者實亦不多臣愚伏望陛下特賜睿斷存留本官暫於在京禮部辦事使得練達政體異日或文學侍從之職或兵刑綱紀之任及公差等項隨所任使必能仰副陛下之意無疑且兵部尚書儀銘素號剛介與人寡合向在南京曽與本官同事亦極口稱本官才德俱優堪任繁劇况臣與本官同郡素知其賢若隱而不言是蔽賢也且夔一介書生官至三品豈復更有所求而臣愚荷陛下委以心腹亦豈敢妄有所舉特以薦賢為國人臣職分內第一事偶有所見不得不言臣謹具密題伏乞聖斷止盜疏題為止盜事臣等近聞京城內外纍有強賊早夜之間十數成羣公然明火執杖打劫人家財物或殺死人致使軍民之家不敢睡眠有終夜坐守者此風漸不可長臣等聞得比先年間為因京師強盜數多巳曽出榜曉諭令賊黨中有能指陳同類姓名并同打劫實迹赴通政司或兵馬司或巡捕官處先行密首者即免本身罪犯仍給各犯贓物一半充賞出首之人官司不得生事拘留即放自便此榜一出衆賊必自互相猜疑恐同類有人出首再不許糾率人恣行相劫此亦止盜之良法也如蒙準題乞降聖旨榜文一道發都察院令遵依謄寫於京城內外各處張挂曉諭一面差人用心緝捕如此則盜賊可息軍民獲安緣係止盜事理未敢擅便謹題謝恩乞恩疏題為謝恩乞恩等事臣係浙江嚴州府淳安縣人由進士正統十年三月欽蒙英宗睿皇帝除臣翰林院修撰正統十二年同陳文充經筵講官正統十四年八月同彭時入內閣辦事歷升兵部左侍郎兼翰林院學士天順元年八月被姦臣石亨等誣陷欽蒙原籍為民兹荷皇上特旨取臣赴京復臣原職內閣辦事恩命下臨兢惶無措竊念臣器非逺大質本凡庸起自書生粗知章句立志期於君子存心慕於古人誤蒙先帝大恩擢居進士首選歷官近侍慚無補報後遇先帝復正大位臣與髙榖首蒙召命慰諭再三令臣照舊辦事豈期權姦忌嫉亟肆擠排造成無根之言加以不明之罪上賴先帝素知臣愚特從寬宥放歸田里俾遂優間十年之間杜門省過以禮義率鄉里以忠孝訓子孫歌詠太平以終餘年臣之分願止於如此兹者伏遇皇上天地之德日月之明察臣寃抑知臣可矜起之廢棄之餘復置清華之地榮幸至此感激何如固宜罄竭犬馬之誠用答乾坤之造但念臣虛名過實本無適用之能未老先衰當知止足之分若不揣巳力貪冒寵榮循至曠官罪將焉逭伏望皇上俯察愚衷曲垂矜憫容臣山林佚老畎畝終身庶幾上不負於聖明下不妨於賢路陛下始終成全之德如天如地臣當結草銜環以圖補報於萬分之一臣無任感恩俟罪之至謹具題以聞伏候敕旨成化三年三月初四日奉聖旨先帝已知有枉朕今擢用爾亦攄忠辦事不準所辭欽此政務疏題為政務事臣叨居內閣慚無補報偶有所見不敢緘默謹述時政一二上塵睿覽伏乞聖明裁度倘有可用乞賜施行臣不勝俟罪之至謹題請旨一勤聖政臣惟自古人君總攬萬幾未嘗不以勤為本如堯舜兢業於一日之間大禹克勤於寸隂之下成湯坐以待旦文王不遑暇食而周書無逸一篇諄諄以逸為戒矧當災異屢見邊方弗靖之日正聖君宵衣旰食不遑寧處之時是可頃刻而忘於勤哉所謂勤者非必下侵庶職惟在戒逸欲以率人法乾健以御下如各司章奏事無巨細悉經御覽固已勤矣然而奏章之外豈無所當究其心者乎何者為足國裕民之道在所當行何者為安邊禦侮之術在所當舉何者為才賢當任之而不疑何者為姦貪當去之而不吝伏望皇上日以數事詢於大臣謀及庶官或使口陳其説或令疏陳其事乞賜裁度見諸施行如此則臣下有所觀感樂於趨事雖欲因循玩愒不可得矣一納諌言臣惟自古帝王未嘗不以求言為務堯舜詢於芻蕘禹聞善言則拜湯從諌弗咈數聖人者其德無以加其治無可議而猶汲汲求言納諫者誠慮夫處崇髙之位逸欲易生非有忠言莫聞其實此其德所以愈盛而其治所以不可及也下逮漢唐宋之君未始不以納諌而興拒諌而失若唐之太宗慚德雖多唯納諫一事髙出近古用能彌縫缺失易亂為治史册書之以為美談惜聽受之際誠偽相半至其晚年漸不克終是以不能無愧於帝王耳欽惟皇上嗣位以來詔旨丁寧凡政事得失民情利病許諸人直言無隱此誠帝王之用心太平之治其機端在於此伏望自今以後凡遇建言之人乞賜優容所言可用即為施行如不可用亦不加罪及成化元年以後廷臣或因建言降調如羅倫輩乞敕吏部查取量復職任如此則善言可進治道可成一儲將材臣惟今之議者率以將臣乏人為慮殊不知自古及今未嘗借於異代特以智勇之士或沈困下僚或棄置間散才能未著人不見信為今之計宜倣前代武舉之法必須儲養試驗於先庶可委任責成於後乞命內外重臣會同總兵等官於在京各營各府各衛見操見任公侯伯都督都指揮指揮千百户鎮撫年四十以下二十以上不分帶俸等項數內精加簡選取其體貌雄偉筋力壯健言辭便利諳曉文墨之人或五六員另擇近便處所時常操練空間之日令讀兵書講求方略就其三營總兵官內委任一員帶管教習每嵗一次會官考試如果弓馬習熟兵書通曉列為上等或弓馬雖熟兵書未通或兵書雖通弓馬未熟列為中等若二長俱無列為下等三嵗三考其三次俱在上等者都指揮以下遞升三級都督以上量加俸祿二次上等者止通加俸祿一次上等并三次中等者平過三次俱下退令間住三年之後依前考試照例賞罰如此則才識日有所進而將臣不至缺乏一飭邊備臣惟禦敵之要邊城為急邊關次之照得大同宣府等處密邇敵境軍馬宜多糧草宜廣若不預為處置一旦有警倉卒調遣逺則緩不及事速則人馬疲乏虛費糧賞訖無成功兵法所謂待敵者佚趨戰者勞是也如蒙乞敕該部會議凡前項緊關城堡酌量添撥軍馬糧草增置墩臺器械設法隄備遇有聲息就便相機行事不必臨期調撥其山海至雁門關中如喜峯古北居庸白羊紫荆倒馬關口雖有官軍守備然各關所轄地方散濶多有山坡小徑可通人馬去處如往年敵兵入境何曽經由正關率皆越山而來後雖差官修理誠恐嵗月經久或被雨水衝塌或因採樵開通徒守正關敵至莫禦欲乞仍差能幹大臣一員前去督同各關守備官員帶領軍夫逐一挨踏何者小坡平漫可通上下即令刓削峻壁使賊寇不能攀援何者蹊徑可通往來即令壘築堅固使人馬不能衝突取具各該守備官員結狀後有疏虞罪及身家此則邊關謹嚴內地人心不致驚疑一汰冗濫臣見得吏員考滿冠帶聽選有經十二三年未得除授者中間多有衣食不給借貸於人貧苦無聊志意衰退將來授之以官委之以事何以責其亷介弗至侵漁於下哉又况纍積愈多聽選愈久數年之後冗濫之弊有不可言當道慮其冗濫也於是多方裁損授職之後曽未幾時有以罷軟而去者有以老病而去者混及他途槩於屏黜彼貪酷不才聲迹顯著者固無足怪矣若乃中人以下之資民情必久而始熟政務必久而始諳雖欲假以嵗月勉圖後功不可得矣夫欲流之清必先濬其源欲末之理莫若正其本慮官之多而不慎選於出身之際徒裁損於任事之後非良法也如蒙乞敕該部今後吏員考滿仍照宣德正統年間事例而行則賢否不混而冗濫可革一廣蓄積臣竊照各處預備倉所儲米穀本以賑濟飢民每嵗官司取勘口數里老止將中等人户開報其鰥寡廢疾無所依倚著實飢民一槩不報蓋慮其無力還官負纍賠納故臣思宋時朱子社倉之法豐年取息二分中年取息一分凶年無息止收其本數年之後息米不可勝計此誠良法也今後各處預備倉飢民關過米穀合無不拘豐年中年嵗通取息一分有係鰥寡廢疾户內别無人丁無所依倚之人俱照數關給不必追徵將所收之息抵補其數抵補之後或有餘剩自作正數入倉如此非惟飢民得濟而數年之後倉廪亦漸充實矣及訪得各處提調正官不行親歷展轉委付致使看倉大户人等多生姦弊放支之際或插和粳粃沙土薦草等項每米穀一石止得五斗六斗者有之及還官之時或刁蹬留難多收斛面或髙估價值折收銀物名雖無息其實加倍今後乞令巡按分巡等官嚴督府州縣正官放收之際務在親行提調痛革前弊庶幾官無虛費民得實用矣一崇聖道臣惟孔子道髙德厚功參造化故中庸稱其如天地之無不持載無不覆幬如四時之錯行如日月之代明臣謹按歷代封號唐稱文宣王宋加至聖元加大成亦云至矣然至聖二字本中庸惟天下至聖言其德之盛也大成二字本孟子作樂者合衆音之小成而為大成言其德之全也但於道字或有所遺於中庸所稱有所未盡故元時加封詔云先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所謂祖述堯舜憲章文武儀範百王師表萬世者也豈非封號未盡於上律下襲故詔詞止及於祖述憲章也歟洪惟我朝尊崇孔子逺過前代而封號仍舊豈非缺典臣愚欲望皇上斷自宸衷於大成之上加封道配天地四字則於孔子之道德無遺中庸之稱述兼盡矣臣又思宋胡安國蔡沈真德秀諸賢雖我朝增入從祀然皆未有封爵乞敕禮部翰林院通行議擬奏請定奪則儒道增光斯文幸甚一謹士習臣惟古者人生八嵗入小學教之孝弟忠信禮義亷恥之事以正其心術十五入大學教以窮理正心修巳治人之道以明於體用此其教有次序故學有成效後世科舉之事立士無少長率留意於文詞無復有如古人之學宋文公朱熹慮風俗人才日趨於下也於是輯為小學一書以垂世立教元時許衡嘗稱之曰小學書吾敬之如父母信之如神明是誠幼學之軌範入德之門户也臣照得今之府州縣學生徒率皆八嵗十嵗入居其中正係古者小學之年合無各處增廣生員不妨舉業俱令兼讀小學教官與之講解義理以啓發良心提督等官按臨之日兼令背誦講説以考察其實行庶幾學無躐等又古者射以觀德今各處學校俱有射圃其朔望習射巳有定例但多視為虛文合無今後提督學校官按臨考課畢仍赴射圃閲諸生習射較其勝負加以賞罰庶幾射藝有成將來得用題奉聖旨所言有理著該衙門看了來説欽此乞恩黜罷疏奏竊見昨者上天垂戒聖心憂勞敕諭羣臣修省改過靜言思之臣等之過尤重其玷纍聖治尤多蓋自祖宗以來設置內閣之臣所以備論思典命令勸勉聖學與聞庶務以助成太平熙皥之化良有在也伏惟皇上聖性髙明可以比仁義於堯舜並勇智於湯武而臣等才業問學殆不及後世之良弼無以贊助萬一言乎思論則不能知無不言言無不盡如魏徵之犯顔敢諌俾其君致貞觀年中斗米三錢外户不閉行旅不齎糧之富足是以黎庶數多貧困言乎典命令不能宣布聖天子威德之烜赫睿思之精微以鼓動四方如陸贄所草詔書使河北叛將讀之歸命山東父老聽之感泣是以外裔猶或崛強言乎勸勉聖學則經筵講讀不能如程正叔之辭嚴義正范祖禹之色溫氣和使聖聰樂聞不厭是以日就月將之功猶未至極至于預聞庶務則未嘗見賢必薦如崔祐甫而用舍之際未合人心未嘗遇事必行如張九齡而處置之間未愜輿論是以四海九州之廣猶未咸寧蓋有其君而無其臣所以不能致治而感動天變也推原臣等不堪其任若此允宜黜罷或退就間散或放歸林泉然後皇上别簡賢能如古之諸臣者來居內閣以毗益大猷庶幾天眷永固自無災異之來宸慮少寬免致宵旰之念奉聖旨卿等職居輔導朕方倚託調燮遽乞退間不允所辭欽此乞休疏題臣本以草茅庸魯之質誤蒙英宗睿皇帝大恩擢自甲科歷官翰苑旋預經筵進厠內閣自知學識疏淺論思弗稱愧無勇退之決致罹讒譖之嫌仰賴先帝天地之量特從寬宥賜歸田里十年之間省躬念咎無復他望重荷皇上日月之明特頒詔命令臣馳驛赴京復臣原守職任臣嘗巳具本乞辭不蒙俞允惶恐受命倐忽逾年殊無寸功可補於治每一思念輒至汗顔緣臣素乏才識兼家居數載役志農圃荒廢學業况衰病早侵眼昏手顫事多遺忘難於供職極知皇上再造之恩如天如地不可有負當竭駑鈍勉效驅馳奈才力弗及如妨政誤事何臣竊惟士之所當明者君臣之義當審者進退之機君臣之義大倫所先進退之機亷恥攸繫論語曰君命召不俟駕而行孟子曰君子進以禮退以義當陛下召命之臨臣若偃蹇目居是不知君臣之義今既無補於治若復貪冒寵祿是不知進退之機不知君臣之義為不忠不知進退之機為無恥矧兹天意未順災變未寧四裔窺覘百姓流徙致厪宸慮不遑寢食當此之時非有卓異之才何能分陛下之憂任陛下之勞亦何能輔陛下之德成陛下之治哉如臣碌碌實不足以語此委的有妨賢路有孤任用伏望陛下矜憫愚衷保全終始賜臣歸老山林以延餘年别選才賢與之共政更望陛下逺法帝王近法祖宗上畏天命下畏人心親賢納諌節用愛人日御經筵講明聖學屏斥異端敦崇正道兢兢業業日慎一日如此則天意自回災異自息百姓自安四裔自服臣幸目覩太平雖布衣蔬食願無不足奉聖旨朕知卿往年以非罪罷官特加簡用今何嫌疑輒求退休宜勉副倚毗所辭不允陵廟疏題為陵廟事臣等仰惟大行慈懿皇太后作配英宗皇帝正位中宫及皇上嗣居宸極尊為慈懿皇太后蓋先帝全夫婦大倫皇上全母子深恩天下後世無容議矣今位號彰著於海宇數十年則夀終之後所宜奉梓宫祔於裕陵奉神主祔於太廟此古今不易之理亦先帝與皇上全大倫深恩之初心也今聞聖命欲别卜葬地臣等實切疑懼竊惟皇上所以若是者必於今皇太后千秋萬嵗之後與先帝同尊於陵廟自嫌二后並配非本朝之制然有二太后方自今始則陵廟之制亦當自今日考諸古協諸義而行之臣等考之前代一帝二后並祔陵廟者未易悉數只如漢文帝尊其生母薄太后然於其嫡母吕太后雖得罪於宗社尚且仍與父髙祖並葬長陵無所改易此文帝所以號為孝文髙出漢諸帝之上也又如宋仁宗追尊其所生母李宸妃為太后然於其嫡母章獻劉太后雖本無子尚且仍與父真宗同祭太廟無所嫌忌此仁宗所以稱為賢君髙出宋諸帝之上皇上於慈懿皇太后昔日致其養今日盡其哀雖文帝仁宗無以加矣若陵廟之祔稍有未合於禮則致貽後議有掩前美况千秋萬嵗之後今皇太后與慈懿皇太后同在陵廟不相妨礙且愈足以見二太后生存之心雍和無間永久之後並美無窮載諸史册增我皇明之輝增我皇上孝德之名此臣等所深願也但臣等識見愚昧未敢以為至當伏望皇上體先帝之心稽前代之制重念綱常之大以臣等所言下於禮部會同皇親公侯駙馬伯文武羣臣公同會議求其至當務合天理允愜人心則國家幸甚天下幸甚臣等不勝悚懼之至謹題成化四年六月二十八日奉聖旨是著禮部便會多官同翰林院計議停當來説欽此乞罷職疏題竊見比年以來水旱相仍地頻震動人民飢窘幾不聊生近者天示彗星災異尤甚推考其由是亦臣下不能修職之所致也况臣等俱以庸劣之資冒居輔導之位學不足以資啓沃識不足以燭幾微才不足以應事文不足以華國而久叨厚祿實切懷慚此而不去罪實難免伏望皇上鑒除舊布新之義奮發乾剛更新庶政將臣等罷歸田里另選賢能以備任用以輔維新之治以回上天之意天下幸甚生民幸甚成化四年九月日題奉聖旨上天垂戒朕宜加修省卿等勉力輔導不準辭歸欽此乞恩辨誣辭職疏題為乞恩辨誣辭職事臣由進士正統十年三月欽除翰林院修撰十二年二月進經筵講官十四年八月入內閣辦事臣自供職以來未嘗不以正道輔君亦未嘗不以忠義自許中間事緒頗多係人臣職分當為不敢備開今御史林誠等有言伏蒙皇上寬宥但臣心實不安略因其言分析一二景泰三年三月間一日早朝退後內臣將本來閣下令衆人議臣因看長男病回家宣喚後到看係廣西逆賊黃􅎫所言易儲事臣言這是大事有上聖皇太后在上為臣子的誰敢議這事設若依這本豈不傷了母后的心當時內臣將本收去臣謂此事必寢不料次日禮部尚書胡濙來言會多官東閣議事臣等隨同到彼足未及門巳聞衆有合準所言之論當就寫本封進御史身為言官彼時十三道不下五六十人曽無一人有言臣於內閣資次第六又何能獨沮其事况臣前項勸止之言天知神知同官皆知當時內臣無有不知天順元年正月被誣之時巳將此言伸訴有本可查即非今日杜撰今林誠等乃以此獨坐臣罪實為誣枉又如天順元年正月十四日郕王有疾不朝太監興安召臣與陳循等至右順門內言上面病重萬幾大事付託何人你每與文武大臣急計議來臣言付託何人事屬含糊不如明言請立東駕使人心有所歸向倘有不諱請東駕率百官往南內迎請父子之間自有處置豈不是順事興安喜云你也説得是本上且説得宛轉些終要這等行臣等回至閣下著人報禮部當有侍郎姚夔鄒幹到來臣等説知此意令轉報各衙門姚夔等喜曰這却好本部胡尚書病在家我急著人扶他進來及各衙門到議定寫本封進不料批出不準十六日擬寫二本伏闕投進本稿係臣在禮部朝房內寫主事俞欽抄謄本內有云陛下為宣宗章皇帝之子當復立宣宗章皇帝之孫正位東宫助理庶政等語姚夔鄒幹等皆稱善因寫二本大小官員僉名數多封進不及伏遇先帝順天應人復正大位退御文華殿首召臣并髙轂至前再三慰諭云我在南宫你兩箇有忠義的心我都知道如今正要用你好生用心辦事臣等受命而退自此以後讒言競進誣以重罪荷蒙先帝知臣本心特從寬宥放歸田里况前二本係多官僉名禮部必然存留伏乞聖明吊查及審問原寫本稿俞欽等便見虛實緣臣平生愚忠揆之於心自知頗亦無愧但才識果然疏淺前後無所建明虛負朝廷任用之意委的有妨賢路伏望皇上曲賜保全將臣罷歸田里當此災異之來宜精選賢才與之共治庶可上回天意下慰人心如臣者斷然不可委任臣不勝惶懼待罪之至謹具題以聞伏候敕旨成化四年九月十五日奉聖旨往事朝廷巳明再不必辨所辭不允欽此乞恩辭職疏題為乞恩辭職事臣見年五十五嵗髮白眼昏手足顫掉精神衰倦力識荒落自知無益於朝廷每欲退休於田野但以皇上特召之恩未能補報萬分之一以此趦趄未決致來今日之言揣巳懷慚悔之晚矣念臣自幼讀書志期君子若一旦昧亷恥之道失進退之義是甘於自畫平生之學皆為虛文何以立身於天地間哉伏望皇上宥臣煩瀆之罪憫臣衰朽罷臣職任容臣歸老林泉得以茍全素志雖死且瞑目矣臣不勝激切俟命之至謹具題請旨成化四年九月十七日奉聖旨朕用卿不疑何恤人言卿勿再辭欽此乞恩罷職疏題為乞恩罷職事臣近因失謹感冒致疾方調理間本月二十日忽見錦衣衛當駕官來家宣喚甚急臣扶病進至左順門該太監許安等傳旨諭令臣入內閣辦事臣以前病未痊行走乏力當乞附奏容臣調理臣竊思近年四方水旱田禾不登人民飢窘兼近日天象垂戒西賊未寧此誠多事之秋上勞宸慮不遑寢食是皆臣下失職輔導無狀所致雖言者論臣景泰中事誠如聖諭不得其實然謂災異由臣所致其言未必非是況除舊布新更化善治以消天變以蘇民困此正陛下乾剛奮發勇於有為之時不宜徒示姑息遏抑人言若是請乞罷臣之疏不行則其他言者所請有關於時政之大者亦恐未必皆行雖欲弭災其道何由況臣衰朽之餘德不足以格君才不足以立政妨賢誤事自知甚明叨冒寵榮實所不忍極知陛下大恩不可有負但臣自處不可不審伏乞皇上早回聖意特賜睿斷將臣罷歸田里以應除舊布新之象然後與在廷文武大臣講求凡政務之間善者行之必力不善者改之勿吝使庶事修明無罅隙之可議則災異自息福祿自來萬萬年太平之機端在於此臣煩瀆聖明不勝隕越待罪之至謹具本令義男親齎具奏以聞伏候敕旨成化四年九月二十三日欽奉聖旨朝廷修舉政務自有次第卿宜速出效用不許故違欽此乞恩優容言官疏題為乞恩優容言官事近該科道論臣景泰中事所言不實巳蒙皇上聖斷臣自揣年力衰邁學識短淺委的無益於事無補於時纍乞罷歸田里以弭人言蒙皇上容留面奉玉音諭之至再臣不敢復有所請方圖勉竭駑鈍以報大恩不意言官又行煩瀆誤犯天威臣聞此事愈增慚愧措身無所竊惟朝廷設置科道糾舉彈劾乃其職分緣林誠等俱係新進歷任未久未諳憲典雖言論失當原其初意亦欲效職若因而加罪非但臣心不安亦於國體未便昨日臣於乞罷之際略辨往事一二未嘗一語及於言官之非者亦知彼之職分當為況臣嘗以開廣言路為言皇上不棄芻蕘即加采納言事之臣復得收用今一旦因論臣事而言者受責臣又默不以言是臣徒能以正道事陛下而不能以正道自處如公論何方今天象示譴四方多事此正求言如渴之時切恐將來以言為諱則國家政務闕失尤有大於此者孰肯為陛下言哉伏望皇上廣天地之量俯賜優容曲加保全非惟言者之幸實天下之幸臣干冒威嚴不勝悚懼待罪之至謹具題以聞伏候敕旨辭免升官疏題為辭免升官事今日得吏部報節該奉敕升臣本部尚書兼職如故仍舊辦事者寵命自天措躬無地緣臣一介草茅官至三品榮幸巳極慚無補報每懷弗寧近因天象示警四方多事省躬念咎愈增憂畏數日以來飲食減少幾於成病誠恐一旦身先朝露無以報陛下大恩為天地間一罪人以此為懼耳豈意衰朽之餘復蒙遷秩之寵伏望皇上收回成命容臣仍舊職辦事少圖報稱倘未即死數年之後或頗有勞效可觀彼時升臣一職尚未為晚今兹恩命實不敢祗受臣冒瀆威嚴不勝戰栗待罪之至謹具題以聞伏候敕旨成化四年十月二十七日欽奉聖旨朕以卿輔導有勞特兹升用不允辭欽此賑恤疏題為賑恤事近聞京城內外多有各處流移之民攜老扶幼百十成羣強者或恃衆攘奪於人弱者至不能動履此必順天府所屬州縣被水小民田禾淹沒室廬飄蕩不得巳而至此伏乞聖明憐憫仍差給事中御史分投處勘數目貫址每大口給與米三升小口減半一面行令各該州縣差人前來招撫復業設法安插本户所有糧差暫行蠲免庶得畿內之民不致失所臣等偶有所聞不敢緘默謹具題知伏乞聖裁修德弭災疏題為修德弭災事昔漢臣董仲舒告武帝有曰天人相與之際甚可畏也國家將有失道之敗天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而喪敗乃至以此見天心之仁愛人君而欲止其亂斯言也古今以為名言茲者彗星見於天田西掃太微北近紫宫其譴告警懼之意至矣仰惟皇上憂切於心戒諭羣臣同加修省是能體上天仁愛之心而欲修政以弭之也其時政得失生民利病諸文武大臣巳條陳上達矣然德者政事之本書曰惟先格王正厥事孟軻曰君正莫不正蓋正萬事必以正君心為本臣等備員近輔無以少禆萬一實深愧懼謹采修德大端并安民大要條陳如左一曰正心術夫天下之道二正與邪而巳正者二帝三王聖賢之道也邪者佛老異端之教也自古人君崇正道者無不安享治平之樂惑邪教者未有不致危亂之憂載諸史册歷歷可鑒臣等仰惟皇上聰明聖智豈不知所決擇而頗留意佛事者聊以試之非誠信之也然外人聞者竊以為議謂內府一次修齋街市一涎騷擾中間委曲誰敢直言行之不巳漸失人心臣等伏望皇上留心聖學毋信異端以正本原減去內府修齋如遇節令止循常例於在外寺觀舉行可也修德應天之本莫先於此二曰謹命令夫王言如絲其出如綸言命令之出不可不慎也伏聞祖宗以來凡傳旨意必先任人如此則責有所在事無虛偽近來聖旨行於光祿寺內府各衙門者傳奉不一政出多門人得詐偽將來之弊有不可言伏望皇上今後斟酌事體可否如有可行必令司禮監官傳旨庶幾命出於一事有可稽而無弊矣三曰親接見夫君天也臣地也天地之氣交則為泰其不交則為否君臣之道何以異是往古事鑒不敢枚舉惟我祖宗列聖在位未有不接見大臣議論政事者君臣情通政是以和今皇上視朝即退端拱九重不一接大臣於便殿天下軍民利病何由盡知豈以首出庶物自能洞察四方耶抑以臣下庸劣不足與議也如臣等者才疏識淺誠不足以備顧問在廷大臣豈無一可伏望皇上日御便殿或三二日一召文武大臣忠直有識者面議政事而可否之或詢軍民之休戚或訪人才之賢否或察治體風俗之得失有疑於心必詢於衆聽覽日熟未必無少補益四曰慎賞罰夫賞罰二者人君治天下之大柄也賞當功罰當罪則人心服一有不當則人心不服故欲服人心莫先於慎賞罰然慎賞罰尤莫先於循舊章守成憲為當近者道路傳言謂賞典太濫近幸無故而受金帛者多工匠無功而冒官職者衆此非舊典所有也用刑太深有法不該充軍而充軍者有罪不至死而死者此非成憲所宜也伏望皇上節賞慎刑惟舊典成憲是循是守使人無偏私枉濫之議則公道彰治法正矣五曰納諌諍夫日有萬幾而事有萬變非兼聽博采何由一一當理是故伊尹以從諌弗咈美成湯傅説以從諌則聖望髙宗而後世之稱賢君者亦必以聽言納諌為首事也伏望皇上以古之聖主明君為法虛心屈巳聽受羣言勿惡其切直勿忽其迂逺茍有當理即賜施行如此則官賞政刑不致乖失而下情得以上通天下利害軍民困苦皆得聞知而久安長治之道其在是矣六曰勵官守書不云乎臣作朕股肱耳目是言君臣一體也今五府六部等衙門非股肱之職乎給事中御史非耳目之司乎股肱舉動合宜耳目聞見不繆則元首尊安為成人矣但今承平百有餘年文恬武嬉事多因循究其弊端難以枚舉大槩主於奉承上旨而嫌於違覆或直行巳意而不加斟酌是以其事不便於軍民者多矣有識者徒能竊議而不敢公言意謂目前茍安懼煩瀆也豈知今日下人愁怨感動天變如此之甚乎伏望皇上戒勵各官慎修厥政今後令職股肱者凡遇事有不便宜再三執奏毋率意行下結怨於民司耳目者但有事為民厲官為民蠧者即便舉奏毋徇情容隱務使庶官變因循為奮勵各舉厥職興起事功然後政善民安為可冀也七曰恤軍民書曰民惟邦本本固邦寧此不易之言也然軍出力以衛民民出賦以供軍軍民相資邦本乃固近來管軍管民官員罔體朝廷愛養軍民之心因公科斂弊出百端軍民窮困日甚一日若此者天下皆然而畿內尤甚何也以差役煩重而又無所資以為生也舊日牧馬草場積年開種田地今多為有力者侵占故馬死而罪責至地少而衣食窘懷憤蓄怨非一日矣伏望皇上命該部清理三營草場使官軍便於牧放減退勢家莊田使百姓便於耕種以資生理其各處衛所府州縣官有巧立名色或謂措辦或謂區畫或謂罰贖或謂勸借等項科斂掊克軍民財物者乞令都察院嚴行禁治毋令恣意朘削以至下人困苦歸怨於上如此軍民各得其所而邦國永寧矣凡此七事實出輿論言之似若違忤行之必有裨益蓋天之視聽在民民心感悅然後天意可回此臣等惓惓愚忠實在於是伏望皇上鑒除舊布新之象斷自聖心力行新政以正心為修德之本以餘事為修德之助德修於上則羣臣咸知感激效職而安養軍民之政次第可舉行矣轉災為祥莫切於此晏嬰曰君無違德何患於彗此之謂也臣等不勝悚懼之至昧死上言伏候敕旨弭盜疏題為弭盜事切見京城內外近來強盜數多官民之家至有遇夜坐守不敢歇卧者此雖巡捕之法不嚴亦由賭博之風太甚近日大街小巷無處無賭博之人乞敕錦衣衛五城兵馬嚴加禁約緝捕以杜塞其源又強盜非一二人能為必須糾合徒衆若出榜曉諭今後強盜之中有能出官首告者與免本身罪犯所得贓物亦不追取如此則人各懷疑不敢公然糾合是亦弭盜之一方也臣謹陳愚見伏乞聖明裁度施行謝賜銀兩表裏疏題為謝恩事恭惟皇上德協天地功光祖宗昨者皇子誕生歡騰中外況臣職居近侍其於欣忭倍萬常情今日復蒙聖恩賜臣銀兩表裏臣叩頭祇受不勝感戴之至謹具題謝恩乞加講官劉珝學士銜疏題照得太常寺卿兼翰林院侍讀劉珝日侍經筵進講經史措辭切當説理詳明深有益於聖學緣一般講書柯潛李泰俱以四品少詹事兼翰林院侍講并學士今本官見任三品卿所兼侍讀乃係本院屬官每日衙門中會揖之際既不可同屬官作揖又不可同學士受屬官揖進退之間十分不便伏望皇上念其為經筵得用之人乞降特旨於所兼侍讀之下加以學士二字庶於事體允當臣濫預經筵偶有所見不敢緘默謹具題知伏乞聖裁辭免升職疏題為辭免升職事兹者伏蒙聖上特敕吏部升臣太子少保改吏部尚書兼職如故臣聞命自天措身無處竊念臣初非博古之學本無宜用之才幸際聖明荷蒙簡拔寵祿過分補報無能每懷尸位之羞極慮妨賢之誚詎意鴻恩復加崇秩伏望皇上收回太子少保之命容臣仍守舊職辦事庶得薄效區區犬馬之勞以圖報萬一不勝幸甚緣係辭免升職事謹具題請旨謝賜綵段疏題為謝恩事恭惟皇上本支隆盛皇子立名喜洽宫闕歡騰朝野此皆陛下至仁大孝感通天地昭格祖宗之所致也臣等覩兹方切欣忭復蒙盛美特遣內臣頒賜臣等綵段表裏聖恩過厚揣巳奚堪臣等頓首祗受不勝感戴之至謹具題謝恩國本疏題為國本事臣等仰惟皇上至仁大孝通於天地光於祖宗誕生皇子聰明岐嶷國本攸繫天下歸心重以貴妃殿下躬親撫育保護之勤恩愛之厚踰於巳出凡內外羣臣以及都城士庶之門聞之莫不交口稱贊以為貴妃之賢近代無比此誠宗社無疆之福也但外間皆謂皇子之母因病另居久不得見揆之人情事體誠為未順伏望皇上敕令就近居住皇子仍煩貴妃撫育俾朝夕之間便於接見庶得以遂母子之至情愜衆人之公論不勝幸甚臣等職居輔導偶有所聞不敢緘默謹具題知伏候聖裁災異疏題為災異事臣等竊惟聖上嗣守祖宗大業十有三年夙夜憂勤圖維治理天下之人無不感仰聖德視前代嗣統之君逺過萬萬是宜天道協和雨賜時若休徵畢應而妖孽不作也夫何近年以來災異日多去嵗宫門火災秋大雨水今春嚴寒河氷重結郊祀之際大風怒號二月朔望日月連蝕南京地震陜西天鳴即日又有妖物害人之異此皆隂盛陽微非常之變也夫天道不逺感召在人觀此則今日人事之不修德政之有虧軍民之怨困莫伸國家之事變叵測不言可知此誠皇上側身修行之時所宜深省逺慮以安宗社為念增修德政講求缺失疏逺私眤節省冗費以回天意可也臣等又惟人君應天以實不以文事神以誠不以物祖宗創為郊祀之禮每年一次舉行極為慎重邇者傳聞皇上推廣敬天之心又於宫北建祠奉祀玉皇取郊祀所用祭服祭器樂舞之具依式製造并新編樂章命內臣習之欲於道家神降之日舉行祀禮臣等竊詳皇上為此非有他故無非上為母后祝釐下為生民祈福用圗保安宗社於萬萬年之久聖心誠敬人所共知但稽之於古未為合禮昔傅説之告髙宗曰黷于祭祀時謂弗欽禮煩則亂事神則難釋之者曰祭不欲黷黷則不敬禮不欲煩煩則擾亂皆非所以交神明之道也況天者至尊無對尤非其他神明可比事之之理宜簡而不宜煩可敬而不可黷今乃别立玉皇之祠祀并用南郊之禮樂則是相去一月之間連行三祭未免人心懈怠誠意不専且郊祀所用執事并樂舞生皆神樂觀道士為之為其離俗出塵清心寡欲但係刑喪病疾之人一切不預祖宗制禮蓋有深意存焉皇上為天之子其於事天之禮豈可不斟酌典故而致有纎毫之不謹乎臣等伏望聖明將前項神祠停罷神像送宫觀侍奉祭服祭器樂舞之具送太常寺收貯凡內廷一應齋醮之事悉且停止今後聖節等項修齋悉照舊例施行勿為褻瀆庶幾天心照鑒可以變災而為祥轉禍而為福宗社萬年無疆之慶端在於此臣等無任區區犬馬圖報之至謹昧死具題以聞伏候敕旨公務疏題為公務事該工部揭帖開稱起蓋乾清門等處缺少松杉等木奏差內外官員請敕前去浙江湖廣等處起運抽分木植前來應用等情臣等看得數內南方松木止可造船并鋪墊倉厫等項其餘俱不堪用合無將抽分杉木板枋照數起運其松木就彼變賣輕齎送部收貯本部照依內官監奏準事理差人先行山西産有去處雇人採取或兩平收買順水撑放實為便利本部又稱除先奏準打造糧船一百隻木料及提舉司器皿厰枋木仍照原數起運外其於在厰并以後新抽木植盡數起解其荆州所抽圍圓不及就將選退之數變賣銀兩并在官錢物責令三司委官兩平收買其在厰木植必然數少以後新抽須用等候雖稱彼處産有木植俱係苗洞地方即今賊勢猖獗客商阻滯亦恐猝難收買合無內外官員且不必差候各厰抽積數多邊報稍寧然後差人趲運況宫門被火深加警省無益之務一切罷去內外人心不勝欣躍則蓋造之事亦宜稍緩臣等偶有所見不敢緘默謹具題知伏乞聖裁修德弭災疏題為修德政弭災異事臣等嘗聞天心仁愛人君莫大於發災變以譴告之尤莫大於出妖孽以警懼之無非欲人君修省過咎以修德政欽崇天道以保天命變禍為祥轉危為安也皇上嗣位以來純仁大孝昭假上下𢎞恩霈澤覃被海宇凡在臣民無不欣戴宜其嘉祥至而景貺臻然而數年之間災異迭見今又妖物頓興豈非天心仁愛我皇上之至故屢屢假此譴謫示警實欲躋斯世於平康之域也往因災變文武羣臣嘗舉政事之當興革上達矣荷蒙允納而行之者有之暫從而復寢者有之顧今妖物之興寧不有在乎皇上洞知此異以為上天示警憂懼修省不遑自寧誠可謂善於事天者矣竊惟事天當以實不以文弭災當以行不以言誠能推今修省之心以修德則德無不修推今憂懼之心以修政則政無不舉德修政舉殆見人心和於下天心和於上上下協和萬福薦臻諸休畢至又何妖孽之不殄滅人心之不安靖乎臣等忝職輔近不能少裨於德政之萬一覩兹災異惶懼實深除有關於聖德謹陳愚見外兹復條具時政數事以聞伏望聖明采納施行之則中外臣民不勝幸甚臣等昧死上言伏候敕旨一節財用夫貨財軍國仰給不可一日而無者也要在撙節用之茍或侈靡妄費則府庫空虛倘遇興師動衆何以賞犒旱潦飢荒何以賑濟故孔子論治國以節用為本其弗信與近年以來朝廷貨財多為下人侵耗如哈密等處番人來京俱帶玉石被細人誘引先將次等者進貢存留一等者在後計囑鋪行人等多估價值賣官規取庫藏銀兩又畨僧授職在彼土管事者例該給與印信使鈐束撫化鄉人近來近京間住者往往自都綱禪師升至國師佛子法王等職一槩給與金印信圖書前任所給者悉自收留其有病故所遺者徒弟人等亦擅收藏及後承襲又求造給侵耗貨財乞敕甘肅等處巡撫等官今後哈密諸番來京帶有玉石即令通事諳曉玉石之人辨驗等第一等者計數封號裝盛送京次等者許其量帶盤費其餘悉令在彼貨賣不許一槩帶來沿途扛運應付艱難如違許巡按分巡等官徑自拿問畨僧升官職印信止許留見在者其前任及病故遺下印信合令該部查收以後有新升職不係本土管事官員復請給者許該部該科參奏發遣勿令在京生事紛擾如此庶事體得宜財無妄費矣一却貢獻臣等謹按傳曰下之事上也不從其令從其所好上好是物下必有甚焉者也經曰玩人喪德玩物喪志蓋人君一心攻之者衆倘一留心於玩好則下人旁搜逺索而貢獻者其弊將有不可勝言者矣洪惟皇上即位之初不急之務一並停止玩好之物一切罷去天下臣民莫不稱慶近來廣西雲南等處有貢竒花異卉珍禽竒獸珍珠寶石金銀器物蓋此物非出於所貢之人必取於民取於民不足又取於土官夷人之家本一物之進必十倍其直然後方至暴橫生靈激變地方莫此為甚其至水路萬里之遙人夫轉運不勝其擾見今安南小國敢肆抗拒漸有內侵之患良由自我有以召之也臣等伏望陛下明聽詔旨今後除常例嵗貢外其內外之臣敢有以玩好之物上進者治罪不宥如是不惟上下綏靖而無擾其於乂安中國感格逺人之道兼得之矣不寶逺物則逺人格惟聖明留意一開言路臣等嘗聞宋臣蘇軾有曰天下治亂出於下情之通塞至治之極至於小民皆能自達時或反是雖近臣不能自通故易以天地交而為泰不交而為否臣等不敢逺引前代明君遇災求言之典伏惟太祖髙皇帝臨御之時自文武羣臣以及軍民匠役諸色人等應有可言之事許直至御前陳説其言中理即為施行且或豫之官或給之賞其不中理者亦置而不問所以廣耳目不偏聽防壅蔽而達下情也故當時雖閭閻之間細微之事無不周知太平至治良有以也洪惟皇上嗣承大統即詔天下凡軍民利病許人直言無隱有以見皇上之心即太祖髙皇帝求言之心也奈何近年以來人多顧忌不肯盡言豈非聽言之道猶有未至者乎臣等仰望聖明廓宇宙之量容涓滴之微明詔在廷文武羣臣凡致災之由弭災之策悉陳以聞言之善者俯賜聽納見於施行言之不善亦不加罪如是則言路開而下情達萬事何憂不理災害何由不息哉一慎刑罰聖人不得巳而用焉用之貴在得中一失其中則邪氣積蓄隂陽繆盩妖孽滋興可不慎歟仰惟皇上嗣位以來凡遇盛暑必下詔寬恤于京師或值災變必遣官詳審於天下慎刑之心蓋與古者虞舜好生之德同一揆也然自成化八年遣官詳審於天下迄今將五年矣夫以京師之內一有寃枉今日告鳴明日或可得以辨彼天下之廣萬姓之繁中間冒罹刑憲者不知有幾其偏州僻縣隔離上司窵逺者豈無經年含寃死於犴獄者乎此則聖明之世不能不為之惻然也合敕法司遴選諳練刑名老成官府照例請敕分投前去會同彼巡撫分巡理刑官員重加研審務使情真罪當輕重適中毫釐不爽庶人無寃枉邪氣潛消而諸孽不作矣一省工役古者力役惟取於冬蓋以時節人力也茍役不節以時勞筋苦骨民不堪生而怨讟以興怨讟既興和氣有弗乖戾者乎此有周先王營宫室而施鼛鼓綏工之仁建靈臺而布庶民勿亟之令良以此耳兹者朝廷修建東直門城樓并各處城垣所以壯觀京師隄禦內外之意既深且廣雖愚夫愚婦莫不悉知以故軍士萬衆一心子來無或嗟怨非以佚道使人孰能然與伏望仰體先王常建仁心審今日興作緩急除城樓城垣所當建外其餘不急之處即頒德音悉令停止庶軍士得以休息怨讟不生和氣漸臻矣一足軍餉臣等竊見往年西北用兵榆林一帶糧草最難供給當時預借陜西山西河南三省租稅起運每草一束用銀二錢米一石用銀一兩或兩半若輸納本色上下山坡展轉溝壑不勝勞苦今無事之時若不早為預備一旦敵入河套復踵前迹民何以堪近者廷臣常議及此臣等尤恐所司奉行不至合敕户部仍查算彼處各堡糧草實數每處可勾幾時之用設有兵動可贍多少人馬如果不敷作何措置或比較屯田拖欠子粒採把未完草束或開種鹽引招商上納草束米豆或將腹裏積蓄糧草量起人夫加意撫恤以漸轉般赴邊收貯或將官銀及贓罰銀兩運赴彼處趂時收糴糧草上倉及其他長策務要一一舉行具實回奏毋得視為泛常其遼東宣府大同雖未經用兵查見蓄積之數務令邉鄙充實庶不臨期誤事一飭邊備臣等見得遼東并山海關喜峯口古北口一帶邊方去京師密邇往年諾延三衛為我藩籬雖有小警微釁不為大患今此三衛既被滿逹勒等服屬以彼之強從此鄉導來犯我邊則京師不得安枕況居庸迤南至紫荆等關口尤係京城切近屏蔽雖有御史遞年點閲緣承平日久未免忽略合敕户部奏遣歷練大臣或歷練老成給事中二員請敕分投前去會同各總兵巡撫守備等官趂今無事之時將各邊墻垣口子逐一看視該修理者即便差撥官軍分工併力深濬厚築以為經久整點煙墩修葺堅固以便哨望不許虛應故事其有城垣坍塌兵器損壞人馬瘦弱不堪備用去處俱要即時修補緊要之處合添人馬亦須斟酌多寡奏請選集聽候有警應用不致緩不及事一重地方臣等聞得永樂年間征取交址郡縣其地天下大一統而無外其後守鎮非人不恤夷情遂至激變失陷地方再不可復今兩廣四川貴州雲南俱係邊逺之地設若任用非人一旦有警軍旅薦興糧運不繼欲天下無事不可得矣其雲南地方與安南尤為切近而蠻夷土官衙門易生事變不可不為深憂今兩廣四川貴州俱有巡撫官而雲南豈宜獨無合敕吏部推選剛直有為智識超卓大臣一員請敕前去巡撫其地凡利有當興弊有當革悉與鎮守等官處置施行各務要安靖地方毋事阿徇有負委任修政弭災疏題為體天道循舊章安人心弭災異事仰惟皇上臨御以來敬天法祖任賢使能政事修明紀綱振舉是以十餘年間海內晏然雖天象屢示警戒而災變自消雖水旱比嵗相仍而民無離叛實由皇上寬仁大度省刑薄斂慈仁愛人之心感孚於上下也夫何近日伺察太繁法令太急刑網太密官校提拿職官事皆出於風聞暮夜搜檢家財不見有無駕帖人心洶洶各懷疑畏內外文武重臣託之為股肱心膂者也亦皆不安於位百司庶府之官資之以建政立事者也舉皆不安於職商賈不安於市行旅不安於途士卒不安於伍庶民不安於業承平之世豈宜有此究其所以蓋緣陛下委聽斷於汪直之一人而汪直者轉寄耳目於羣小汪直之失雖未為甚而羣小之中其姦謀足以顛倒是非其巧佞足以蠱惑人心如韋瑛者自言親承密旨得専豫奪之柄自謂百官進退盡在掌握之中擅作威福虛張聲勢其間同惡相濟如王瑛者則以附巳而薦之稍存公論有所諌正者則以異巳而黜之如狼如虎肆無忌憚原其立心惟知希求進用以為一身之榮不思傷害良善虧損國體大為聖德之纍陛下若謂防微杜漸不得不然則前數年間何以帖然無事往者曹欽之反皆由逯杲生事有以激之人所共知可為明鑒昔唐太宗當天下甫定之後骨肉相殘羣雄側目嫌疑之際宜乎過慎也而乃從魏徵仁義之言拒封德彞刑罰之説遂致海內殷富斗米三錢外户不閉幾於刑措太宗因封德彞死謂羣臣曰此魏徵勸我行仁義之效也恨不令封德彞見之夫德修而民自化法急而民愈亂考之前史歷歷可驗孔子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格我國家積德百有餘年深仁厚澤浹洽於人四方萬國孰不歸戴陛下為守文令主嚴刑峻法誠非所宜況今天鳴地震無處無之水旱傷災日甚一日省躬念咎弭災息患之道莫先於恤刑獄莫要於安人心而乃反此所為使人人嗟怨感傷和氣一旦有警變且莫測腹心之患可不懼乎可不慮乎伏願皇上體天地之包容勿察察於事情遵祖宗之成憲勿屑屑於改易旨意必經於六科防將來之假冒奏訴必由於通政杜濫受於他門責政事於府部而嚴課功核實之權付刑獄於刑司而申三覆五奏之令收回伺察之人誅逐姦邪之輩其有謀逆姦細并貪贓壞法重情悉依舊規委任歷練老成之人管理如此則讒言不入於耳自足以頥情而養神苛政不加於下自足以安邦而定國延聖夀於萬年保皇圖於不拔其端皆在於此不然此風日長衆口嗷嗷國之安危未可知矣臣等荷陛下生成之德置諸宥密之地一念愛君之心拳拳朝夕有所聞見豈容緘默謹條陳大略具題以聞伏候聖斷即賜施行則宗社幸甚天下幸甚臣等謹俯伏俟命計開一舊設行事人員専一緝訪謀反妖言強盜人命及盜倉庫錢糧等項大事今西厰専却搜尋細故凡街市鬭毆罵詈爭雞縱犬及一時躲避不及者或加捶楚或煩瀆聖聽致干重法以致在城軍民驚惶不安一職官有犯緝訪得出請旨拿送經該衙門問招明白有罪者奏請發落供明者請旨還職係是定制今聞西厰將廣西勘事郎中武清自通州聽選方面官劉福自歇家俱拿到厰監禁數日輒又釋放且武清係五品官劉福係正三品官擅拿擅放恣意所為紊亂朝政莫大於此一官員犯罪追贓者法司自有成規今西厰自擅封兵部武選司門以後遇官員有犯正身未曾問招先將本家門封閉或夤夜越墻進入搜檢財物或將命婦剝去衣服用刑辱打被害之家有同抄劫以致各衙門大小官員驚惶不安若從此不止日後或有姦人強盜假名害人者真偽何由而辨一京營管軍頭目俱係朝廷託以重寄之人其公私勤惰朝廷自有賞罰今聞西厰不論有無事情一槩令人跟緝鈐束以致各懷危疑不安一各處鎮守總兵等官乃一方安危所係既被選用當任之無疑待之從厚其或有事不得不差人體察事畢即巳今聞西厰各處差人採聽事情彼其聞知寧不慮恐患及退縮自保誤事非輕一各布政司多有王府所在今西厰差校尉分投去彼行事不但官司驚疑各王府亦未免有危事生不測天順年間曽差校尉各處行事皇上即位之初即巳革去後三四年尚有假充校尉詐錢害人者此明驗也不可不懲一河道係兩京各處錢糧貨物經由之路要在通行不宜阻滯今聞西厰官校分布沿河一帶遇有船到即加盤問間有公差官員被其搜檢以致往來客商軍民人等聞風驚疑有未起程停止不來有在中途寄放回還者似此貨物不通將來京師公私費用何以仰給抑恐姦盜假此搜船劫人卒難禁止一朝廷威福不可下移自立西厰之後太監汪直每日出外跟隨之人數多但遇官員人等無不喝令下馬雖大臣亦謹回避如兵部尚書項忠當早朝鼓響伺候之時汪直令校尉就左掖門下呼呌項忠不得朝罷被校尉擁逼而去其欺凌大臣如此至於法司郎中御史等官每遇吊查文卷俱要親齎赴厰竟日伺候不得一見又如東西兩長安門牌上用黃紙帖寫太監汪傳奉聖旨不書其名滿朝官員見者無不驚駭一百户韋瑛係無藉小人纍投勢要不肯容留從征僥幸得升前職夤緣投西厰行事之後發人事情言多失實又引進譎詐小人王英結為心腹専一訐人隂私以固信任凡前項拿人放人擅封門户搜檢家財凌辱婦女驚動人心紊亂朝政等項俱係二人所為一臣等竊詳此等事情非惟與治體相關又與天道災異相關何也去嵗七月以後有妖物出自西北繞城傷人當時人言必有應驗及妖怪方息遂立西厰驚駭人心一如妖物傷人之時以此觀之天道豫先示戒不可不慮今太監汪直年幼未諳世事止憑韋瑛等主使呈報中間固有一二似為禁革姦弊奈非祖宗舊制所革未多其失人心則巳甚矣中外騷然安能保其無意外不測之變若不早為除革一旦禍興卒難消弭伏望皇上斷自宸衷革去西厰罷黜汪直間住以全其身將韋瑛王英拿送法司會同錦衣衛推問明白治以重罪如此則人心可安天意可回矣乞恩休致疏題為乞恩休致事臣見年六十四嵗原籍浙江嚴州府淳安縣人由進士正統十年三月欽除翰林院修撰正統十四年八月內閣辦事歷升侍郎學士等官天順元年正月被石亨等誣陷原籍為民成化二年十二月欽蒙皇上特旨取臣赴京俾復原任纍升今職此誠天地再造之恩臣雖至愚豈不知感是以朝夕思念寢食不安誓殫犬馬之勞兾效涓埃之報奈才力淺薄學識荒疏荏苒十年曽無寸報每自循省不覺汗顔邇來年紀寖加筋力愈衰眼目昏花肌體羸瘦兼以右手先因閃挫不時痛發艱於舉筆雖是日逐力疾朝參勉強供職譬之嬰兒學走終非自然況宥密之地大政所關以臣衰朽之餘豈堪久玷伏望皇上俯賜矜憫容臣退休田里以盡餘年則君臣始終之義至矣臣不勝激切俟命之至謹具題請旨休致辭職疏題為乞恩辭職事臣於本月二十一日具陳老疾願乞休致二十二日欽奉聖旨卿歷練老成朕方倚任但自陳衰朽力求退休特兹俞允以遂優間升少保還寫敕給驛與他回去該衙門知道欽此臣本以庸愚退處山林自分與草木同腐誤蒙皇上斷自宸衷召臣復任重覩日月之光再霑雨露之榮皇上生成之恩實同天地臣雖粉骨碎身亦難報於萬分之一奈何老病侵尋無禆於事仰荷聖明俯賜俞允巳為萬幸復蒙升臣少保之職臣聞命戰兢措身無地夫少保輔導之官宜處異才顧臣衰朽之質豈堪濫預伏望皇上收回新命容臣以舊官致仕庶幾恩典弗至於太過臣心頗得以少安將日與田夫野老歌詠太平以終餘年則臣未死之日皆陛下所賜也感恩報恩何能巳乎緣係乞恩辭職事理謹具題請旨聖旨卿輔導有年今乞休致特升前職不允所辭商文毅疏稿
