body:
  text: 商文毅疏稿跋先大父平生不紀行事之蹟先大夫殿講之暇博詢勤録乃得奏議若干首如右若夫二十年間朝夕獻納於顧問之頃有如聖諭非外人所知者冝不減此嘗輯素菴文集凡數十巻兩遭回祿悉為煨燼幸而此巻獨存愳散逸因鋟諸梓四方君子或得於𫝊聞而此録所未備者不吝教示幸甚孫汝頤百拜謹識
