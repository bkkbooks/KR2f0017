body:
  text: 商文毅疏稿詔令奏議𩔖二奏議之屬提要臣等謹案商文毅疏稿一巻明商輅撰輅有續通鑑綱目别著録是集為其子侍講良年所編後有其孫汝頤跋稱輅素菴文集凡數十巻兩遭回禄悉為煨燼幸此巻獨存因鋟諸梓云云此本為天一閣所鈔則刋本又佚矣其得𫝊者幸也所列奏疏凡三十三篇明史所載景泰時請清理塞上軍田招輯開封鳯陽諸處流民成化時首陳八事及辨林誠之誣請皇太子視紀妃疾弭災八事劾西厰太監汪直諸疏今皆在集中惟劾汪直一疏史載列直十一罪而不言其目此集所載乃止十條或為𫝊寫佚脱一條抑或史文誤衍一字歟又邊務一疏凡言二事其一論養軍莫善於屯田若不屯田雖傾府庫之財竭軍民之力不能使邊城充實宜禁勢豪侵佔令邊軍分二班耕種非専言清理官田史但稱覈還之軍未盡其實其一論守邊為上守闗次之若徒守京城最為下䇿不宜全調保定等處精鋭官軍備禦京城而以紫荆倒馬諸要隘委之輪撥京兵致望風先潰其言尤深中明代之弊史削而不載亦刪除過當是集所載乃其全文尤足以補史闕也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c6b525790bb380a444ca5deab6500ee4a2bc894d7f20f5ffff3715949c22d128
